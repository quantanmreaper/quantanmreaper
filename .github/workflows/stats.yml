name: GitHub Stats

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: anuraghazra/github-readme-stats@master
        with:
          USERNAME: quantanmreaper
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
